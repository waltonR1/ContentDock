[app]
host = 127.0.0.1
port = 5088
secret_key = change-this-secret
auto_open_browser = true

[database]
host = your.server.ip
port = 3306
database = real_estate_db
user = house_admin
password = your_db_password
charset = utf8mb4

[sftp]
host = your.server.ip
port = 22
username = your_ssh_username
password = your_ssh_password
; 推荐后续改用私钥。使用私钥时，注释 password，启用 key_path：
; key_path = C:\Users\WANG_R1\.ssh\id_rsa

[upload]
remote_dir = /var/www/html/house/php/uploads
public_prefix = /house/php/uploads
allowed_extensions = jpg,jpeg,png,webp
max_size_mb = 8

[display]
; 后台预览图片时使用。留空时会尝试从 upload.remote_dir 本地代理读取。
; 如果图片在远程网站上，填写前台网站域名，例如：https://example.com
image_base_url =

[ui]
